<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoLady - AI SEO Solutions & Audit Platform</title>
    <meta name="description" content="Professional AI SEO tools and industry-specific audit solutions for global business visibility.">
    <link rel="stylesheet" href="/style.css">
    <style>
        .portal-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            text-align: center;
            color: white;
            padding: 20px;
        }
        .portal-logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0052d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .portal-choices {
            display: flex;
            gap: 2rem;
        }
        .portal-btn {
            padding: 1.5rem 3rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-en {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .btn-ru {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .portal-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #fff;
            color: #000;
            box-shadow: 0 10px 40px rgba(255,255,255,0.1);
        }
        .portal-footer {
            margin-top: 4rem;
            opacity: 0.5;
            font-size: 0.9rem;
        }
    </style>
<meta name="keywords" content="website audit Kazakhstan Almaty"/>
</head>
<body class="theme-dark">
    <div class="portal-container">
        <h1 class="portal-logo">InfoLady AI</h1>
        <p style="margin-bottom: 3rem; font-size: 1.2rem; opacity: 0.8;">Choose your language to proceed to the AI SEO Hub</p>
        
        <div class="portal-choices">
            <a href="/en/" class="portal-btn btn-en">English Version</a>
            <a href="/ru/" class="portal-btn btn-ru">Русская версия</a>
        </div>

        <div class="portal-footer">
            &copy; 2026 InfoLady.online | AI-Powered Search Optimization
        </div>
    </div>
</body>
</html>
