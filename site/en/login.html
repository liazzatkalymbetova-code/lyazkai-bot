<style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--bg-base);
            position: relative;
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 48px 40px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            margin-bottom: 32px;
        }

        .auth-logo span {
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-sub {
            color: var(--text-muted);
            font-size: .9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: var(--r-full);
            padding: 13px 18px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: .95rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--accent-secondary);
        }

        .auth-btn {
            width: 100%;
            margin-top: 8px;
        }

        .auth-links {
            margin-top: 20px;
            text-align: center;
            font-size: .88rem;
            color: var(--text-muted);
        }

        .auth-links a {
            color: var(--accent-secondary);
            text-decoration: none;
        }

        .auth-error {
            display: none;
            background: rgba(255, 90, 31, .12);
            border: 1px solid rgba(255, 90, 31, .3);
            border-radius: var(--r-md);
            padding: 10px 14px;
            font-size: .88rem;
            color: var(--accent-tertiary);
            margin-bottom: 16px;
        }

        .auth-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .12;
            pointer-events: none;
        }

        .auth-orb-1 {
            width: 300px;
            height: 300px;
            background: var(--accent-secondary);
            top: -80px;
            right: -80px;
        }

        .auth-orb-2 {
            width: 250px;
            height: 250px;
            background: var(--accent-primary);
            bottom: -60px;
            left: -60px;
        }
    </style>
<link href="https://infolady.online/en/login.html" rel="canonical"/>
<!-- Multilingual SEO -->
<link href="https://infolady.online/en/login.html" rel="canonical"/>
<link href="https://infolady.online/en/login.html" hreflang="en" rel="alternate"/>
<link href="https://infolady.online/ru/login.html" hreflang="ru" rel="alternate"/>
<link href="https://infolady.online/" hreflang="x-default" rel="alternate"/>

    <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js" defer></script>

      document.addEventListener("DOMContentLoaded", function() {
        if (typeof lucide !== 'undefined') {
             lucide.createIcons();
        }
      });
    </script>

<meta name="keywords" content="website audit Kazakhstan Almaty"/>

<body>

<div class="auth-orb auth-orb-1"></div>
<div class="auth-orb auth-orb-2"></div>
<div class="auth-card">
<div style="display: flex; justify-content: space-between; align-items: start;">
<a class="auth-logo" href="/en/">Info<span>Lady</span></a>
<ul class="pnav__links" role="list">
<li class="pnav__item"><a class="pnav__trigger" href="/en/visibility-audit.html">SEO Audit</a></li>
</ul>
<div class="lang-switch" style="display:flex; gap: 4px;">
<button class="lang-btn active" data-lang="en" style="font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer;">RU</button>
<button class="lang-btn" data-lang="en" style="font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; border: 1px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer;">EN</button>
</div>
</div>
<h1 class="auth-title" data-i18n="login_title">Welcome back</h1>
<p class="auth-sub" data-i18n="login_sub">Log in to access your AI SEO reports and dashboard</p>

                again.</div>
<form id="loginForm" onsubmit="handleLogin(event)">
<div class="form-group">

<input autocomplete="email" id="loginEmail" placeholder="your@email.com" required="" type="email"/>
</div>
<div class="form-group">
<div style="display:flex; justify-content: space-between;">
<label data-i18n="lbl_password" for="loginPassword">Password</label>
<a data-i18n="login_forgot" href="https://t.me/lyazkai_bot?start=help" style="font-size: 0.8rem; color: var(--accent-secondary); text-decoration: none;">Forgot password?</a>
</div>
<input autocomplete="current-password" id="loginPassword" placeholder="••••••••" required="" type="password"/>
</div>
<button class="btn btn-primary btn-lg auth-btn" data-i18n="login_btn" id="loginBtn" type="submit">Login
                    →</button>

<button class="btn btn-secondary btn-lg auth-btn" onclick="alert('Google OAuth mapping setup required.')" style="margin-top: 12px;display:flex;justify-content:center;gap:8px;" type="button">

<div class="auth-links">

<a data-i18n="login_back" href="/en/" style="color:var(--text-dim);margin-top:8px;display:inline-block;">← Back to
                    InfoLady</a>
</div>
</div>
</div>
<script>
        /* Redirect if already logged in */
        if (localStorage.getItem('infolady_session')) {
            window.location.href = 'dashboard.html';
        }

        // --- Translation Setup ---
        const authT = {
            en: {
                login_title: "Welcome back",
                login_sub: "Log in to access your AI SEO reports and dashboard",
                lbl_email: "Email",
                lbl_password: "Password",
                login_forgot: "Forgot password?",
                login_btn: "Login →",
                login_google: "Continue with Google",
                login_error: "<i data-lucide="x-circle" class="icon"></i> Invalid email or password. Please try again.",
                login_create_prompt: "Don't have an account?",
                login_create_link: "Create one free →",
                login_back: "← Back to InfoLady",
                register_title: "Create Account",
                register_sub: "Start analyzing and tracking your websites for free",
                register_btn: "Create Account →",
                register_login_prompt: "Already have an account?",
                register_login_link: "Login here →",
                btn_logging_in: "Logging in...",
            },
            ru: {
                login_title: "Добро пожаловать",
                login_sub: "Войдите, чтобы получить доступ к SEO-отчётам и панели",
                lbl_email: "Email",
                lbl_password: "Пароль",
                login_forgot: "Забыли пароль?",
                login_btn: "Войти →",
                login_google: "Продолжить с Google",
                login_error: "<i data-lucide="x-circle" class="icon"></i> Неверный email или пароль. Попробуйте снова.",
                login_create_prompt: "Нет аккаунта?",
                login_create_link: "Создать бесплатно →",
                login_back: "← На главную InfoLady",
                register_title: "Регистрация",
                register_sub: "Анализируйте и отслеживайте свои сайты бесплатно",
                register_btn: "Создать аккаунт →",
                register_login_prompt: "Уже есть аккаунт?",
                register_login_link: "Войти здесь →",
                btn_logging_in: "Входим...",
            }
        };

        // --- Multi-lang logic ---
        let currentLang = localStorage.getItem('il_lang') || 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('il_lang', lang);
            document.documentElement.lang = lang;

            // Toggle active button styles
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                    btn.style.borderColor = 'var(--border)';
                    btn.style.background = 'var(--bg-card)';
                } else {
                    btn.classList.remove('active');
                    btn.style.borderColor = 'transparent';
                    btn.style.background = 'transparent';
                }
            });

            // Replace strings
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (authT[lang] && authT[lang][key]) {
                    el.textContent = authT[lang][key];
                }
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => setLanguage(e.target.dataset.lang));
        });

        // Initial setup
        setLanguage(currentLang);

        function handleLogin(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value.trim().toLowerCase();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');
            var errEl = document.getElementById('loginError');

            btn.textContent = authT[currentLang]['btn_logging_in'];
            btn.disabled = true;
            errEl.style.display = 'none';

            setTimeout(function () {
                var users = JSON.parse(localStorage.getItem('il_users') || '[]');
                var user = users.find(function (u) { return u.email === email && u.password === btoa(password); });

                if (user) {
                    localStorage.setItem('infolady_session', JSON.stringify({ name: user.name, email: user.email, since: user.since }));
                    window.location.href = 'dashboard.html';
                } else {
                    errEl.style.display = 'block';
                    btn.textContent = authT[currentLang]['login_btn'];
                    btn.disabled = false;
                }
            }, 700);
        }
    </script>
<script defer="" src="/js/lead-capture.js"></script>
<script defer="" src="/js/leads-app.js"></script>
</body>
