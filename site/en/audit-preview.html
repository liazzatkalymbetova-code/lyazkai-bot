<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Preview — InfoLady</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0B0E14 0%, #0F172A 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 32px 20px 80px;
        }

        /* PDF card */
        .pdf {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5);
        }

        /* Header */
        .pdf-head {
            background: linear-gradient(135deg, rgba(0,224,255,0.06), rgba(124,90,255,0.06));
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .pdf-logo { font-size: 10px; font-weight: 800; color: #00E0FF; text-transform: uppercase; letter-spacing: 1.5px; }
        .pdf-domain { font-size: 15px; font-weight: 700; color: #fff; margin-top: 3px; }
        .pdf-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,0.35); line-height: 1.6; }

        /* Score row */
        .score-row {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .score-ring {
            flex-shrink: 0;
            width: 88px; height: 88px;
            border-radius: 50%;
            border: 3px solid var(--c, #EF4444);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.25);
        }
        .score-num { font-size: 28px; font-weight: 800; color: var(--c, #EF4444); line-height: 1; }
        .score-of  { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .score-info { flex: 1; min-width: 0; }
        .grade-pill {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            background: rgba(var(--rgb, 239,68,68), 0.12);
            color: var(--c, #EF4444);
            margin-bottom: 8px;
        }
        .grade-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c, #EF4444); }
        .score-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
        .score-sub   { font-size: 12px; color: rgba(255,255,255,0.4); }

        /* Sections */
        .section { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sec-label {
            font-size: 9px; font-weight: 800; color: #00E0FF;
            text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 10px;
        }
        .summary-text { font-size: 14px; line-height: 1.75; color: rgba(255,255,255,0.82); }

        /* Issues */
        .issues { display: flex; flex-direction: column; gap: 10px; margin-top: 2px; }
        .issue {
            display: flex; align-items: flex-start; gap: 11px;
            padding: 11px 13px; border-radius: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .issue.error  { border-color: rgba(239,68,68,0.18); background: rgba(239,68,68,0.03); }
        .issue.warning{ border-color: rgba(245,158,11,0.18); background: rgba(245,158,11,0.03); }
        .issue svg { flex-shrink: 0; margin-top: 1px; }
        .issue-body { flex: 1; min-width: 0; }
        .issue-title  { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.4; }
        .issue-impact { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }

        /* Blur / paywall */
        .blur-wrap { position: relative; padding: 20px 24px 0; }
        .blur-inner {
            filter: blur(5px);
            pointer-events: none; user-select: none;
            opacity: 0.55;
        }
        .paywall {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(15,23,42,0.1) 0%, rgba(15,23,42,0.97) 38%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            padding: 24px 20px;
            gap: 14px;
            z-index: 2;
        }
        .pw-title   { font-size: 17px; font-weight: 800; text-align: center; }
        .pw-sub     { font-size: 13px; color: rgba(255,255,255,0.55); text-align: center; max-width: 360px; line-height: 1.5; }
        .unlock-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 13px 28px;
            background: linear-gradient(135deg, #00E0FF, #7C5AFF);
            color: #000; font-weight: 800; font-size: 14px;
            border-radius: 12px; text-decoration: none;
            box-shadow: 0 8px 32px rgba(0,224,255,0.22);
            transition: transform 0.18s, box-shadow 0.18s;
            white-space: nowrap;
        }
        .unlock-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,224,255,0.32); }
        .pw-features {
            display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
        }
        .pw-feat { font-size: 11px; color: rgba(255,255,255,0.45); display: flex; align-items: center; gap: 4px; }

        /* Loading */
        .loading {
            padding: 64px 24px;
            display: flex; flex-direction: column;
            align-items: center; gap: 14px; text-align: center;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(0,224,255,0.15);
            border-top-color: #00E0FF;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-text { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.7); }
        .load-step { font-size: 12px; color: rgba(255,255,255,0.35); }

        /* Back */
        .back { text-align: center; margin-top: 20px; }
        .back a { font-size: 12px; color: rgba(255,255,255,0.35); text-decoration: none; }
        .back a:hover { color: rgba(255,255,255,0.6); }

        /* Mobile */
        @media (max-width: 520px) {
            .wrap { padding: 16px 12px 64px; }
            .pdf-head { flex-direction: column; align-items: flex-start; gap: 6px; }
            .pdf-meta { text-align: left; }
            .score-row { gap: 14px; padding: 18px 18px; }
            .score-ring { width: 76px; height: 76px; }
            .score-num { font-size: 24px; }
            .section, .blur-wrap { padding: 16px 18px 0; }
            .section { padding-bottom: 16px; }
            .unlock-btn { font-size: 13px; padding: 12px 22px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="pdf" id="pdf">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="load-text" id="loadText">Analyzing your site...</div>
            <div class="load-step" id="loadStep">Checking SEO signals...</div>
        </div>
    </div>
    <div class="back"><a href="javascript:history.back()" id="backLink">← Back</a></div>
</div>

<script src="/js/config.js"></script>
<script>
(function () {
    const isRU = window.location.pathname.startsWith('/ru/');
    const lang = isRU ? 'ru' : 'en';

    document.getElementById('backLink').textContent = isRU ? '← Назад' : '← Back';

    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (!url) { window.location.href = isRU ? '/ru/' : '/en/'; return; }

    /* Loading steps */
    const steps = isRU
        ? ['Проверяем SEO-сигналы...', 'Анализируем структуру...', 'Оцениваем контент...', 'Генерируем отчёт...']
        : ['Checking SEO signals...', 'Analyzing page structure...', 'Evaluating content...', 'Generating report...'];
    document.getElementById('loadText').textContent = isRU ? 'Анализируем сайт...' : 'Analyzing your site...';
    let si = 0;
    const stepTimer = setInterval(() => {
        si = (si + 1) % steps.length;
        const el = document.getElementById('loadStep');
        if (el) el.textContent = steps[si];
    }, 900);

    /* Fetch */
    const apiBase = (typeof API_URL !== 'undefined') ? API_URL : 'https://api.infolady.online';
    fetch(`${apiBase}/api/audit?url=${encodeURIComponent(url)}&lang=${lang}`)
        .then(r => r.json())
        .then(data => { clearInterval(stepTimer); render(data); })
        .catch(() => {
            clearInterval(stepTimer);
            document.getElementById('pdf').innerHTML = `
                <div class="loading">
                    <div style="font-size:28px">⚠️</div>
                    <div class="load-text" style="color:#EF4444">${isRU ? 'Не удалось проанализировать сайт' : 'Could not analyze the site'}</div>
                    <div class="load-step">${isRU ? 'Попробуйте другой URL' : 'Try another URL'}</div>
                </div>`;
        });

    /* Helpers */
    function scoreVars(s) {
        if (s >= 80) return { c: '#10B981', rgb: '16,185,129' };
        if (s >= 60) return { c: '#F59E0B', rgb: '245,158,11' };
        return { c: '#EF4444', rgb: '239,68,68' };
    }

    function iconError() {
        return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
    }
    function iconWarn() {
        return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
    }

    function issueHTML(issue) {
        const icon = issue.type === 'error' ? iconError() : iconWarn();
        return `<div class="issue ${issue.type}">
            ${icon}
            <div class="issue-body">
                <div class="issue-title">${issue.title}</div>
                ${issue.impact ? `<div class="issue-impact">${issue.impact}</div>` : ''}
            </div>
        </div>`;
    }

    function render(d) {
        const { domain, analysisDate, score, grade, gradeColor, summary, issues, hiddenIssues, totalIssues } = d;
        const sv = scoreVars(score);
        const payLink = `/${lang}/payment.html?plan=basic`;

        /* Visible issues HTML */
        const visHTML = (issues || []).map(issueHTML).join('');

        /* Blurred ghost issues — use hidden if available, else fake placeholders */
        const blurCount = Math.max(3, (hiddenIssues || []).length);
        const blurHTML = Array.from({ length: blurCount }, (_, i) => issueHTML({
            type: i % 3 === 0 ? 'error' : 'warning',
            title: isRU ? `Проблема ${(issues || []).length + i + 1}` : `Issue ${(issues || []).length + i + 1}`,
            impact: isRU ? 'Влияет на позиции и конверсию' : 'Affects rankings and conversions'
        })).join('');

        const extraCount = totalIssues - (issues || []).length;
        const shownExtra = extraCount > 0 ? extraCount : blurCount;

        document.getElementById('pdf').innerHTML = `
            <!-- Header -->
            <div class="pdf-head">
                <div>
                    <div class="pdf-logo">InfoLady</div>
                    <div class="pdf-domain">${domain}</div>
                </div>
                <div class="pdf-meta">
                    <div>${isRU ? 'Превью аудита' : 'Audit Preview'}</div>
                    <div>${analysisDate}</div>
                </div>
            </div>

            <!-- Score -->
            <div class="score-row" style="--c:${sv.c};--rgb:${sv.rgb}">
                <div class="score-ring">
                    <div class="score-num">${score}</div>
                    <div class="score-of">/100</div>
                </div>
                <div class="score-info">
                    <div class="grade-pill" style="--c:${sv.c};--rgb:${sv.rgb}">
                        <div class="grade-dot"></div>${grade}
                    </div>
                    <div class="score-title">${isRU ? 'SEO-рейтинг' : 'SEO Score'}</div>
                    <div class="score-sub">${isRU ? `Найдено проблем: ${totalIssues}` : `Issues found: ${totalIssues}`}</div>
                </div>
            </div>

            <!-- Summary -->
            <div class="section">
                <div class="sec-label">${isRU ? 'Краткий вывод' : 'Executive Summary'}</div>
                <div class="summary-text">${summary || ''}</div>
            </div>

            <!-- Visible issues -->
            <div class="section">
                <div class="sec-label">${isRU ? 'Обнаруженные проблемы' : 'Issues Found'}</div>
                <div class="issues">${visHTML}</div>
            </div>

            <!-- Blurred paywall -->
            <div class="blur-wrap">
                <div class="sec-label" style="margin-bottom:10px">${isRU ? `Скрытые проблемы (${shownExtra}+)` : `Hidden issues (${shownExtra}+)`}</div>
                <div class="blur-inner">
                    <div class="issues">${blurHTML}</div>
                    <div style="margin-top:14px;padding:13px 14px;background:rgba(124,90,255,0.07);border-radius:10px;border:1px solid rgba(124,90,255,0.14);">
                        <div style="font-size:12px;font-weight:700;margin-bottom:6px;">📋 ${isRU ? 'Рекомендации по исправлению' : 'Recommendations'}</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.4);">████████████ ██████ ████████████████</div>
                        <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">████████ ███████████ ██████████</div>
                    </div>
                    <div style="height:48px"></div>
                </div>
                <div class="paywall">
                    <div class="pw-title">🔒 ${isRU ? 'Получите полный аудит' : 'Get the Full Audit'}</div>
                    <div class="pw-sub">${isRU
                        ? `Ещё ${shownExtra}+ проблем, конкретные рекомендации и план роста для ${domain}`
                        : `${shownExtra}+ more issues, specific recommendations, and a growth plan for ${domain}`
                    }</div>
                    <a href="${payLink}" class="unlock-btn">
                        🔓 ${isRU ? 'Разблокировать полный аудит' : 'Unlock Full Audit'}
                    </a>
                    <div class="pw-features">
                        <span class="pw-feat">✓ ${isRU ? '50+ проверок' : '50+ checks'}</span>
                        <span class="pw-feat">✓ ${isRU ? 'PDF-отчёт' : 'PDF report'}</span>
                        <span class="pw-feat">✓ ${isRU ? 'Готово за 24 ч' : '24h delivery'}</span>
                    </div>
                </div>
            </div>
        `;
    }
})();
</script>
</body>
</html>
