<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="robots" content="noindex, nofollow"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Панель отчетов | InfoLady</title>
    <link href="/favicon.png" rel="icon" type="image/png"/>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="/style.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        .dashboard-hero { padding: 60px 0 40px; text-align: center; background: radial-gradient(circle at top, rgba(0, 224, 255, 0.05) 0%, transparent 70%); }
        .dashboard-form { max-width: 450px; margin: 0 auto 40px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 25px; backdrop-filter: blur(10px); }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        .input-group input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px 16px; color: #fff; font-family: var(--font-body); }
        
        .scans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
        .scan-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; padding: 20px; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .scan-card:hover { transform: translateY(-3px); border-color: rgba(0, 224, 255, 0.2); background: rgba(255,255,255,0.03); }
        .score-badge { position: absolute; top: 20px; right: 20px; background: rgba(0, 224, 255, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; border: 1px solid rgba(0, 224, 255, 0.2); }
        .score-badge.critical { color: #f87171; background: rgba(248, 113, 113, 0.1); border-color: rgba(248, 113, 113, 0.2); }
        
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
    </style>
</head>
<body class="page-dashboard">
    <!-- NAV -->
    <nav class="nav" role="navigation">
        <div class="container">
            <div class="nav__inner">
                <a class="nav__logo" href="/ru/">InfoLady</a>
                <div class="pnav__right">
                    <a class="btn btn-primary btn-sm" href="/ru/visibility-audit.html">Новый аудит</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <section class="dashboard-hero">
            <div class="container">
                <span class="section-label section-label--glow">🚀 Личный кабинет</span>
                <h1>Ваши отчеты об аудите</h1>
                <p class="lead">Введите email, который вы указывали при сканировании, чтобы увидеть историю анилизов.</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="dashboard-form">
                    <label style="font-size: 0.9rem; color: var(--text-dim);">Укажите ваш email:</label>
                    <div class="input-group">
                        <input id="user-email" placeholder="example@mail.com" type="email"/>
                        <button class="btn btn-primary btn-sm" onclick="loadScans()">Показать</button>
                    </div>
                </div>

                <div id="loading-spinner" style="display:none; text-align:center; padding: 20px;">
                    <p>Загрузка отчетов...</p>
                </div>

                <div class="scans-grid" id="scans-list">
                    <!-- Cards populate dynamically -->
                </div>
                
                <div class="empty-state" id="empty-state">
                    <i data-lucide="folder-search" style="width: 48px; height: 48px; margin: 0 auto 15px; color: var(--text-dim);"></i>
                    <p>Отчетов не найдено. Введите ваш email выше или запустите <a href="/ru/visibility-audit.html">новый аудит</a>.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/dashboard.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            
            // Auto load if saved in localstorage
            const savedEmail = localStorage.getItem('user_email');
            if (savedEmail) {
                document.getElementById('user-email').value = savedEmail;
                loadScans();
            }
        });
    </script>
</body>
</html>
